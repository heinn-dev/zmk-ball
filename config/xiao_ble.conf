# Mouse/pointer HID support (built into ZMK core, no extra module required)
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y

# PMW3610 driver (badjeff/zmk-pmw3610-driver). It talks to the sensor over
# hardware SPI (the single SDIO line is wired to both MOSI and MISO), so
# SPI + pinctrl are required even though there's no dedicated SPI header used.
CONFIG_PINCTRL=y
CONFIG_SPI=y
CONFIG_PMW3610_ALT=y

# Sensor tuning - uncomment/adjust as needed. CPI is set in the devicetree
# node instead (see xiao_ble.keymap).
# CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=8

# The driver has no way to wait for the sensor's power rail to actually be
# ready - it reads the product ID almost immediately after boot. Per
# badjeff's own README, an "Incorrect product id 0xFF" on nRF52840 boards
# is commonly just this race, fixed with an extra startup delay.
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000

# Debug logging over USB CDC-ACM (xiao_ble already routes the console there
# by default). Remove once the sensor is confirmed working.
CONFIG_LOG=y
CONFIG_PMW3610_ALT_LOG_LEVEL_DBG=y

# Power tuning
CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
