# Mouse/pointer HID support (built into ZMK core, no extra module required)
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y

# Board-only builds (no shield) have no Kconfig.defconfig to set this, so it
# defaults to a blank BLE advertised name unless we set it ourselves.
CONFIG_ZMK_KEYBOARD_NAME="Trackball"

# PMW3610 driver (badjeff/zmk-pmw3610-driver). It talks to the sensor over
# hardware SPI (the single SDIO line is wired to both MOSI and MISO), so
# SPI + pinctrl are required even though there's no dedicated SPI header used.
CONFIG_PINCTRL=y
CONFIG_SPI=y
CONFIG_PMW3610_ALT=y

# Sensor tuning - uncomment/adjust as needed. CPI is set in the devicetree
# node instead (see xiao_ble.keymap).
# CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=8

# The sensor drops out of full-rate RUN sampling after just 128ms of no
# motion by default, into a much slower REST1 sampling rate - noticeable as
# lag every time movement resumes after a brief pause. Trade some power for
# staying in RUN mode much longer.
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=1000

# Pointer acceleration (nuovotaka/zmk-pointing-acceleration-alpha, community
# module - not an official ZMK feature). Level 1 "Simple" with custom values
# tuned for our 600 CPI sensor - see &pointer_accel in xiao_ble.keymap.
CONFIG_ZMK_INPUT_PROCESSOR_ACCELERATION=y
CONFIG_INPUT_PROCESSOR_ACCEL_LEVEL_SIMPLE=y
CONFIG_INPUT_PROCESSOR_ACCEL_PRESET_CUSTOM=y

# Power tuning
CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# ZMK's default BLE peripheral latency (30) lets the radio skip up to 30
# connection intervals when idle, to save power - but this can add a
# noticeable "catch-up" delay when movement resumes. 0 forces a connection
# event every interval instead, trading battery life for responsiveness.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
